<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>МАКСИМ БАУЛИН | DIGITAL AGENCY</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@900&display=swap');
        :root { --accent: #ff3b30; --bg: #000; --text: #fff; }
        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Syncopate', sans-serif; overflow-x: hidden; }
        
        /* Входной экран */
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; display: flex; justify-content: center; align-items: center; flex-direction: column; }
        .start-btn { background: none; border: 1px solid #fff; color: #fff; padding: 15px 40px; cursor: pointer; font-family: 'Syncopate'; transition: 0.3s; }
        .start-btn:hover { background: #fff; color: #000; }

        #cursor { width: 20px; height: 20px; background: #fff; border-radius: 50%; position: fixed; pointer-events: none; z-index: 9999; mix-blend-mode: difference; }
        #cursor-follower { width: 40px; height: 40px; border: 1px solid #fff; border-radius: 50%; position: fixed; pointer-events: none; z-index: 9998; transition: transform 0.15s ease-out; }
        .illusion-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: repeating-conic-gradient(from 0deg, #111 0deg 30deg, #000 30deg 60deg); background-size: 100px 100px; opacity: 0.3; z-index: -1; transform: scale(1.2); }
        
        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .hero h1 { font-family: 'Inter', sans-serif; font-size: 12vw; line-height: 0.8; text-transform: uppercase; letter-spacing: -5px; background: linear-gradient(90deg, #fff, #555, #fff); background-size: 200%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: gradientMove 3s infinite linear; }
        @keyframes gradientMove { 0% { background-position: 0%; } 100% { background-position: 200%; } }
        
        .services { padding: 100px 20px; max-width: 1200px; margin: 0 auto; }
        .photo-slider { max-width: 1200px; margin: 0 auto 80px; padding: 0 20px; }
        .slider-title { font-size: 22px; letter-spacing: 4px; margin-bottom: 20px; text-transform: uppercase; color: var(--accent); }
        .slider-frame { position: relative; width: 100%; aspect-ratio: 16 / 9; overflow: hidden; border: 1px solid #333; border-radius: 16px; background: #060606; }
        .slider-track { display: flex; height: 100%; transition: transform 0.5s ease; }
        .slide { min-width: 100%; height: 100%; }
        .slide img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .slider-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 1px solid #555;
            color: #fff;
            background: rgba(0, 0, 0, 0.55);
            font-size: 24px;
            line-height: 1;
            cursor: pointer;
            z-index: 2;
        }
        .slider-btn.prev { left: 14px; }
        .slider-btn.next { right: 14px; }
        .slider-dots { display: flex; justify-content: center; gap: 10px; margin-top: 14px; }
        .slider-dots button {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            border: 0;
            background: #444;
            cursor: pointer;
        }
        .slider-dots button.active { background: var(--accent); }
        .slider-empty { color: #888; text-align: center; padding: 30px 0; font-size: 12px; letter-spacing: 2px; }
        .service-item { font-size: 5vw; padding: 40px 0; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; transition: all 0.4s; text-decoration: none; color: inherit; position: relative; }
        .service-item:hover { color: var(--accent); padding-left: 50px; }
        .view-projects { font-size: 14px; color: var(--accent); opacity: 0; transition: 0.3s; text-transform: uppercase; letter-spacing: 2px; }
        .service-item:hover .view-projects { opacity: 1; }
        .tag { font-size: 14px; background: var(--accent); padding: 5px 15px; border-radius: 20px; color: #000; margin-left: auto; margin-right: 20px; }
        .footer { padding: 50px; text-align: center; font-size: 12px; color: #555; }
    </style>
</head>
<body>
    <div id="overlay">
        <h1 style="color:#fff; margin-bottom:20px; font-size:2vw;">MAXIM BAULIN</h1>
        <button class="start-btn" onclick="startApp()">ENTER SYSTEM</button>
    </div>

    <audio id="bg-music" loop>
        <source src="https://drive.google.com/file/d/16y67C8uMnUwAjiASmrhgbzExjsoEQQ9v/view?usp=sharing" type="audio/mpeg">
    </audio>

    <div id="cursor"></div>
    <div id="cursor-follower"></div>
    <div class="illusion-bg" id="bg"></div>

    <section class="hero">
        <p style="color: var(--accent); margin-bottom: 20px;">[ AGENCY OF FUTURE ]</p>
        <h1 id="main-title">МАКСИМ<br>БАУЛИН</h1>
        <p style="margin-top: 30px; letter-spacing: 5px;">SITES • BOTS • APPS • BEATS</p>
    </section>

    <section class="services">
        <a href="sites.html" class="service-item" onmouseenter="playSound(440)">
            <span>САЙТЫ</span>
            <span class="tag">TOP LEVEL</span>
            <span class="view-projects">СМОТРЕТЬ →</span>
        </a>
        <a href="apps.html" class="service-item" onmouseenter="playSound(520)">
            <span>БОТЫ</span>
            <span class="tag">AI INSIDE</span>
            <span class="view-projects">СМОТРЕТЬ →</span>
        </a>
        <a href="miniapps.html" class="service-item" onmouseenter="playSound(650)">
            <span>MINI APPS</span>
            <span class="tag">TELEGRAM</span>
            <span class="view-projects">СМОТРЕТЬ →</span>
        </a>
        <a href="beats.html" class="service-item" onmouseenter="playSound(880)">
            <span>БИТЫ</span>
            <span class="tag">EXCLUSIVE</span>
            <span class="view-projects">СМОТРЕТЬ →</span>
        </a>
    </section>

    <section class="photo-slider" id="photo-slider">
        <h2 class="slider-title">Галерея</h2>
        <div class="slider-frame">
            <button class="slider-btn prev" id="prev-slide" aria-label="Предыдущее фото">‹</button>
            <div class="slider-track" id="slider-track"></div>
            <button class="slider-btn next" id="next-slide" aria-label="Следующее фото">›</button>
        </div>
        <div class="slider-dots" id="slider-dots"></div>
        <p class="slider-empty" id="slider-empty" hidden>Добавь фотографии в папку src/ и укажи их в src/photos.json</p>
    </section>

    <footer class="footer">MAXIM BAULIN AGENCY © 2026</footer>

    <script>
        function startApp() {
            document.getElementById('bg-music').play();
            gsap.to("#overlay", { opacity: 0, duration: 1, onComplete: () => document.getElementById('overlay').style.display='none' });
        }

        const cursor = document.getElementById('cursor');
        const follower = document.getElementById('cursor-follower');
        const bg = document.getElementById('bg');

        document.addEventListener('mousemove', (e) => {
            gsap.to(cursor, { x: e.clientX, y: e.clientY, duration: 0 });
            gsap.to(follower, { x: e.clientX - 10, y: e.clientY - 10, duration: 0.3 });
            const moveX = (e.clientX - window.innerWidth / 2) * 0.05;
            const moveY = (e.clientY - window.innerHeight / 2) * 0.05;
            gsap.to(bg, { x: moveX, y: moveY, duration: 1 });
        });

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(freq) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        }

        gsap.from("#main-title", { duration: 2, y: 100, opacity: 0, skewY: 10, ease: "power4.out" });
        gsap.registerPlugin(ScrollTrigger);
        document.querySelectorAll('.service-item').forEach(item => {
            gsap.from(item, { scrollTrigger: { trigger: item, start: "top bottom-=100" }, x: -100, opacity: 0, duration: 1 });
        });

        const sliderTrack = document.getElementById('slider-track');
        const sliderDots = document.getElementById('slider-dots');
        const sliderEmpty = document.getElementById('slider-empty');
        const prevSlideBtn = document.getElementById('prev-slide');
        const nextSlideBtn = document.getElementById('next-slide');
        let currentSlide = 0;
        let autoplayId = null;
        let slideCount = 0;

        function renderSlider(images) {
            slideCount = images.length;
            sliderTrack.innerHTML = images.map((src, index) => `
                <div class="slide">
                    <img src="${src}" alt="Фото ${index + 1}">
                </div>
            `).join('');
            sliderDots.innerHTML = images.map((_, index) => `
                <button aria-label="Слайд ${index + 1}" data-slide="${index}" class="${index === 0 ? 'active' : ''}"></button>
            `).join('');
            sliderDots.querySelectorAll('button').forEach(btn => {
                btn.addEventListener('click', () => {
                    goToSlide(Number(btn.dataset.slide));
                    restartAutoplay();
                });
            });
            goToSlide(0);
            startAutoplay();
        }

        function goToSlide(index) {
            if (slideCount === 0) return;
            currentSlide = (index + slideCount) % slideCount;
            sliderTrack.style.transform = `translateX(-${currentSlide * 100}%)`;
            sliderDots.querySelectorAll('button').forEach((dot, dotIndex) => {
                dot.classList.toggle('active', dotIndex === currentSlide);
            });
        }

        function startAutoplay() {
            stopAutoplay();
            autoplayId = setInterval(() => goToSlide(currentSlide + 1), 4000);
        }

        function stopAutoplay() {
            if (autoplayId) clearInterval(autoplayId);
            autoplayId = null;
        }

        function restartAutoplay() {
            stopAutoplay();
            startAutoplay();
        }

        async function initSlider() {
            let images = [];
            try {
                const response = await fetch('src/photos.json');
                if (response.ok) {
                    const photoList = await response.json();
                    if (Array.isArray(photoList)) {
                        const candidates = photoList.map(item => `src/${item}`);
                        const checks = await Promise.all(candidates.map(src => new Promise(resolve => {
                            const img = new Image();
                            img.onload = () => resolve(src);
                            img.onerror = () => resolve(null);
                            img.src = src;
                        })));
                        images = checks.filter(Boolean);
                    }
                }
            } catch (_) {}

            if (images.length === 0) {
                sliderEmpty.hidden = false;
                prevSlideBtn.disabled = true;
                nextSlideBtn.disabled = true;
                return;
            }

            renderSlider(images);
            prevSlideBtn.addEventListener('click', () => {
                goToSlide(currentSlide - 1);
                restartAutoplay();
            });
            nextSlideBtn.addEventListener('click', () => {
                goToSlide(currentSlide + 1);
                restartAutoplay();
            });
        }

        initSlider();
    </script>
</body>
</html>
